version: '3.8'

services:
  inpi-scraper-worker:
    build: .
    container_name: inpi-scraper-worker
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - INPI_USER=${INPI_USER}
      - INPI_PASSWORD=${INPI_PASSWORD}
    volumes:
      - inpi_scraper_data:/app/data

volumes:
  inpi_scraper_data:
