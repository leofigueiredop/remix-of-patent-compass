services:
  # Frontend (Vite)
  web:
    build:
      context: .
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    ports:
      - "5173:5173"
    depends_on:
      - api

  # Backend Orchestrator (Node.js)
  api:
    build: ./backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-patent-scope-secret-change-me}
      - DATA_DIR=/app/data
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-patent_compass}
      - OLLAMA_BASE_URL=http://ollama:11434
      - WHISPER_BASE_URL=http://whisper:8000
      - OLLAMA_PRIMARY_MODEL=${OLLAMA_PRIMARY_MODEL:-llama3.1:8b-instruct-q4_K_M}
      - OLLAMA_SECONDARY_MODEL=${OLLAMA_SECONDARY_MODEL:-llama3.1:8b-instruct-q4_K_M}
      - OPS_CONSUMER_KEY=${OPS_CONSUMER_KEY:-}
      - OPS_CONSUMER_SECRET=${OPS_CONSUMER_SECRET:-}
      - INPI_MODE=${INPI_MODE:-scrape}
    volumes:
      - api_data:/app/data
    depends_on:
      - ollama
      - whisper
      - db

  # Local LLM Service
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
      - OLLAMA_NUM_THREADS=${OLLAMA_NUM_THREADS:-8} # Use 8 of 12 cores for IA stability
    deploy:
      resources:
        limits:
          memory: 16G # Adjust based on 40GB total
    restart: unless-stopped

  # Speech-to-Text Service
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      - WHISPER_MODEL=small # Use small instead of medium for speed on CPU
      - WHISPER_BEAM_SIZE=5
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_DEVICE=cpu
      - WHISPER_NUM_WORKERS=2 # Use only 2 cores for transcription
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    volumes:
      - whisper_cache:/root/.cache/huggingface

  # Database (Postgres)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-patent_compass}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  ollama_data:
  whisper_cache:
  postgres_data:
  api_data:
